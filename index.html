<!DOCTYPE html>
<html>
<head>
  <title>Maestro Mastering</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 60px;
    }

    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      margin: auto;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #4c6fff;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    input {
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h1>🎧 Maestro Mastering</h1>

  <div class="box">
    <p>Upload your track</p>

    <input type="file" id="file" />
    <br>

    <button onclick="upload()">Master Track</button>

    <p id="status"></p>
  </div>

  <script>
    async function upload() {
      const file = document.getElementById("file").files[0];
      const status = document.getElementById("status");

      if (!file) {
        status.innerText = "Select a file first";
        return;
      }

      status.innerText = "Processing...";

      const form = new FormData();
      form.append("track", file);

      const res = await fetch("/master", {
        method: "POST",
        body: form
      });

      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "mastered.wav";
      a.click();

      status.innerText = "Done ✔ Downloaded";
    }
  </script>

</body>
</html>
