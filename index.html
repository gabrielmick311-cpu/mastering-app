<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mastering App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0f14;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: 420px;
      background: #151925;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.8;
    }

    select, input[type="file"], button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #222838;
      color: white;
    }

    button {
      background: #42c7a4;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #35b592;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }

    .progress {
      height: 8px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #42c7a4;
      transition: 0.2s;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Audio Mastering</h1>

    <form id="masterForm">

      <!-- PRESET -->
      <div class="field">
        <label>Preset</label>
        <select id="preset" name="preset">
          <option value="spotify">Spotify (Balanced)</option>
          <option value="rnb">R&B (Smooth)</option>
          <option value="trap">Trap (Loud)</option>
          <option value="drill">Drill (Hard)</option>
        </select>
      </div>

      <!-- FILE -->
      <div class="field">
        <label>Audio File</label>
        <input type="file" id="file" name="file" accept="audio/*" required />
      </div>

      <!-- BUTTON -->
      <button type="submit">Master Track</button>

      <!-- PROGRESS -->
      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <div id="status">Waiting...</div>

    </form>
  </div>

<script>
const form = document.getElementById("masterForm");
const fileInput = document.getElementById("file");
const preset = document.getElementById("preset");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = fileInput.files[0];
  if (!file) return alert("Upload a file");

  const formData = new FormData();
  formData.append("track", file);
  formData.append("preset", preset.value);

  status.textContent = "Processing...";
  bar.style.width = "20%";

  try {
    const res = await fetch("/master", {
      method: "POST",
      body: formData
    });

    bar.style.width = "80%";

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = file.name.replace(/\.[^/.]+$/, "") + "_mastered.wav";
    document.body.appendChild(a);
    a.click();
    a.remove();

    bar.style.width = "100%";
    status.textContent = "Done! Downloaded.";

  } catch (err) {
    console.log(err);
    status.textContent = "Error processing file.";
    bar.style.width = "0%";
  }
});
</script>

</body>
</html>
